databases:
  - name: salonhub-db
    plan: free
    databaseName: salonhub
    user: salonhub

services:
  - type: web
    name: salaoregina
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: salonhub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NEXT_PUBLIC_API_URL
        value: /api
