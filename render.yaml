databases:
  - name: salonhub-db
    plan: free
    databaseName: salonhub
    user: salonhub

services:
  - type: web
    name: salonhub-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: salonhub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: https://salonhub-frontend.onrender.com

  - type: web
    name: salonhub-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start -- -p $PORT
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://salonhub-backend-tp5t.onrender.com/api
